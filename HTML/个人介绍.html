<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人介绍</title>
    <link rel="shortcut icon" type="image/x-icon" href="../图片/僧人.jpg">

    <style>
        * {
            margin: 0;
            padding: 0;
        }

        .clear {
            clear: both;
        }
        body{
            background-color:rgb(227,228,229);
            
        }

        .center {
            width: 900px;
            margin: 0 auto;
     
            background-color: #fff;
            box-shadow: 5px 6px 10px -4px #fff;

        }

        h5 {
            text-align: center;
            height: 50px;
            font-size: 25px;
            margin-bottom: 30px;
            margin-top:50px;
        }

        p {
            text-align: center;
        }

        /* 关于我的三个小模块 */

        .about>div {
            float: left;

            width: 200px;
            height: 400px;

            margin-right: 50px;
            margin-left:50px;
        }

        .center .about .habby {
            width: 200px;
            height: 300px;
           
        }
        .center .about p {
            margin-top: 30px;
        }
        .center .about .game p{
            display:block;
            margin-bottom: 30px;
            padding: 30px;
            

        }
    </style>
</head>

<body>
    <div class="center">
        <img src="../图片/关于我/魈.jpg" alt="" width="900px">
        <h5>关于我</h5>
        <div class="about">
            <div class="hobby">
                <img src="../图片/关于我/爱好.png" alt="" width="200px">
                <p> 你不要误会，我不是在吃，只是在去吃的路上。人生就该吃喝玩乐。</p>
            </div>
            <div class="game">
                <p>偶尔玩一玩小游戏放松一下，并没有沉迷，只是“放松”</p>
                <img src="../图片/关于我/原神.png" alt="" width="200px">

            </div>
            <div class="dream">
                <img src="../图片/关于我/梦想.jpg" alt="" width="200px">
                <p>想要成为一名全栈程序员，知道离这个目标还很遥远，但是这并不妨碍我做白日梦</p>
            </div>


        </div>
       
        <div class="clear"></div>
        
        

    </div>

</body>

</html>
