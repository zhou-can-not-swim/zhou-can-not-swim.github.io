<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="shortcut icon" type="image/x-icon" href="../图片/僧人.jpg">

    <style>
        * {
            margin: 0px;
            padding: 0px;

            color:rgb(34, 32, 32);
        }

        a {
            text-decoration: none;
        }

        .clear {
            clear: both;
        }

        body {

            background-image: linear-gradient(to bottom, rgb(247, 242, 242), rgb(227, 224, 224), rgb(158, 153, 153));
            background-repeat: no-repeat;
            background-size: contain;
        }

        .box {
            width: 800px;
            height: 1000px;
            margin:0px auto;


            
            background-color: rgba(0, 0, 0, 0.2);
            box-shadow: 5px 6px 10px -4px rgba(0, 0, 0, 0.2);

        }

        h3 {
            text-align: center;
            font-size: 30px;
            height: 60px;
            line-height: 60px;

        }

        a {
            float: left;
            width: 140px;
            height: 40px;

            text-align: center;
            line-height: 40px;
        }

        a:hover {
            background-color: #fff;
        }

        /* 对前端模块 */
        .qianduan,.java,.shequ {
            height: 200px;
            margin: 0 50px;
        }
    </style>
</head>

<body>
    <div class="box">
        <div class="qianduan">
            <h3>前端</h3>
            <a href="https://developer.mozilla.org/zh-CN/">mdn</a>
            <a href="https://www.w3school.com.cn/">w3schools</a>
            <a href="https://getbootstrap.com/docs/5.2/getting-started/introduction/">bootstrap</a>
            <a href="https://threejs.org/">three.js</a>
            <a href="https://www.json.cn/">在线json</a>
            <a href="https://element.eleme.cn/2.13/#/zh-CN">element.ui</a>
        </div>
        <div class="java">
            <h3>java</h3>
            <a href="https://codegym.cc/zh/">codegym</a>
            <a href="https://how2j.cn/">how2j</a>
            <a href="https://www.programcreek.com/simple-java/">simple-java</a>
            <a href="https://www.programmr.com/zone/java">programmr</a>

        </div>
        <div class="shequ">
            <h3>社区视频资源</h3>
            <a href="https://leetcode.cn/">leetCode</a>
            <a href="https://www.csdn.net/">CSDN</a>
            <a href="https://github.com/">Github</a>
            <a href="https://gitee.com/dashboard">Gitee</a>
            <a href="https://www.runoob.com/">菜鸟教程</a>
            <a href="https://www.codingame.com/">coddingGame</a>
            <a href="https://www.bilibili.com/">b站</a>
            <a href="https://www.icourse163.org/">慕课网</a>
        </div>
    </div>
</body>

</html>
