<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="../js/login.js"></script>
    <style>
        * {
            margin: 0px;
            padding: 0px;

            color: #fff;
        }

        body {
            background-image: linear-gradient(to right, rgb(124, 199, 114), rgb(54, 143, 178), rgb(135, 94, 179));
        }

        .center {
            width: 250px;
            height: 375px;
            background-color: rgba(0, 0, 0, 0.3);

            margin: 100px auto;
            border-top: 1px solid transparent;

            box-shadow: 5px 6px 10px -4px rgb(87, 150, 198);

            z-index: 99;
        }

        h1 {
            text-align: center;
            margin-top: 40px;

            background: linear-gradient(to bottom right, rgb(172, 74, 74), rgb(42, 42, 142), rgb(134, 134, 62));

            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;

            z-index: 99;


        }

        input {
            margin-bottom: 45px;
            width: 200px;
            height: 35px;

            border: 0px solid transparent;
            margin-left: 25px;
            padding-left: 10px;

            font-size: 15px;
            letter-spacing: 8px;

            outline: none;
            background-color: rgba(0, 0, 0, 0);
            border-bottom: 1px solid black;

            z-index: 99;

        }

        form {
            margin-top: 50px;

            z-index: 99;

        }

        button {
            width: 100px;
            height: 35px;
            background-color: #fff;

            margin-left: 75px;
            /* 对里面的字体设置 */
            font-weight: 700;
            font-size: 20px;

            border: none;
            background-image: linear-gradient(to bottom right, rgb(53, 51, 51), rgba(205, 191, 191));
            color: rgb(33, 54, 147);

            box-shadow: 4px 4px 4px -4px rgb(53, 51, 51);
            /*对按钮进行模糊处理 */
            filter: blur(0.3px);

            z-index: 99;

        }

        button:hover {
            cursor: pointer;
        }

        input,
        button,
        .center {
            border-radius: 10px;

        }

        /* 对背景wel设置 */
     .bgf{
        height: 55px;
        font-weight: 700;
        font-size:50px;
        text-align: center;

       

        
     }
     .bgf span{
        background-image: linear-gradient(to right, rgb(135, 94, 179), rgb(54, 143, 178));

background-clip: text;
-webkit-background-clip: text;
color: transparent;
     }
    </style>
</head>

<body>
    <div class="bgf"> 
        <span>welcome</span>
        <span>my</span>
        <span>private</span>
        <span>web</span>
    </div>





    <div class="center">
        <h1>login</h1>
        <form>
            <input type="text" name="name" placeholder="用户名" maxlength="3">
            <input type="password" name="pwd" placeholder="密码" maxlength="6">
            <button type="button" value="登录">登录</button>
        </form>
    </div>
</body>

</html>
